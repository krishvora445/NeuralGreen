services:
  # Backend Service
  - type: web
    name: neuralgreen-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: PORT
        value: 5001

  # Frontend Service (Static Site)
  - type: static
    name: neuralgreen
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
